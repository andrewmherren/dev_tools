services:
  godot-mcp:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /workspace
    command:
      - sh
      - -lc
      - >
        npx -y gopeak
    environment:
      GOPEAK_BRIDGE_HOST: "0.0.0.0"
      GODOT_BRIDGE_PORT: "6505"
      GOPEAK_TOOL_PROFILE: "compact"
    ports:
      - "6505:6505"
    volumes:
      - ./:/workspace:rw